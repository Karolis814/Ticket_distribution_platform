name: Deploy Web to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'src/TicketPlatform.Web/**'
      - 'src/TicketPlatform.Shared/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  AZURE_WEBAPP_NAME: app-ticketplatform-web-markk
  PROJECT_PATH: src/TicketPlatform.Web/TicketPlatform.Web.csproj
  PUBLISH_DIR: ${{ github.workspace }}/publish

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-restore --output ${{ env.PUBLISH_DIR }}

      - name: Deploy wwwroot to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEB_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}/wwwroot
