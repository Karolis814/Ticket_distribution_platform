services:
  postgres:
    image: postgres:16
    container_name: ticket_platform_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ticket_platform
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_pass
    ports:
      - "5432:5432"
    volumes:
      - ticket_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ticket_user -d ticket_platform" ]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ticket_platform_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ticket.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit:latest
    container_name: ticket_platform_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — http://localhost:8025

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: ticket_platform_azurite
    restart: unless-stopped
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data --loose"
    ports:
      - "10000:10000"   # Blob
      - "10001:10001"   # Queue
      - "10002:10002"   # Table
    volumes:
      - ticket_azurite_data:/data

  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: ticket_platform_stripe
    restart: unless-stopped
    command: "listen --forward-to http://host.docker.internal:5001/api/stripe-webhook"
    environment:
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_DEVICE_NAME: ticket_platform_dev

volumes:
  ticket_pgdata:
  ticket_azurite_data:
